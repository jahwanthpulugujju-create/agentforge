name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # GitHub requires this to opt into the Node 24 runtime for JavaScript actions.
  # Without it, actions fall back to Node 20 which may emit deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t typecheck

  lint:
    name: Lint (module boundaries)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Enforces the app→shared→shared dependency DAG (apps never depend on
      # apps; shared depends only on shared) via @nx/enforce-module-boundaries.
      - run: pnpm nx run-many -t lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t test

  # Unit tests on the non-Linux OSes. This job exists because issue #41
  # shipped through a green PR: units ran on ubuntu only and the OS matrix
  # covered e2e only, so three classes of Windows-only unit failures lived
  # on main undetected. Windows runs on PRs too (that is where #41 should
  # have been caught); macOS runs on push only (its unit-level divergence
  # from ubuntu is near nil). Deliberately NOT in `e2e-api`'s `needs` — a
  # slow Windows leg must not gate e2e start.
  #
  # The legs run vitest DIRECTLY per package (after an nx build of their
  # deps) rather than `nx run-many -t test`: nx demonstrably swallows a
  # failed task's vitest stdout on Windows — even with
  # --output-style=stream — which made #41 undiagnosable through the
  # normal path. Mirrors the `unit-direct` dispatch mode in
  # cross-platform-test.yml.
  test-os:
    name: Unit Tests (${{ matrix.os }})
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["windows-latest","macos-latest"]') || fromJSON('["windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Unit tests (direct vitest per package)
        shell: bash
        run: |
          set -uo pipefail
          pnpm nx run-many -t build --projects=platform,cli,dashboard
          rc=0
          for dir in packages/shared/platform packages/cli packages/dashboard; do
            echo "===== vitest: $dir ====="
            (cd "$dir" && pnpm exec vitest run --reporter=verbose) || rc=1
          done
          exit $rc

  e2e-api:
    name: API E2E (${{ matrix.os }})
    needs: [typecheck, test]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx e2e cli-e2e
      - run: pnpm nx e2e dashboard-api-e2e

  e2e-ui:
    name: UI E2E (Playwright)
    needs: [typecheck, test]
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Initialize OCR directory
        run: |
          mkdir -p .ocr/skills .ocr/sessions .ocr/data
          git config user.email "ci@ocr.dev"
          git config user.name "OCR CI"
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm nx e2e dashboard-ui-e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dist/.playwright/
          retention-days: 7
